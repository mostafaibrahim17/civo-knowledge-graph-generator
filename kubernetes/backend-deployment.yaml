apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge-backend
  template:
    metadata:
      labels:
        app: knowledge-backend
    spec:
      containers:
      - name: backend
        image: alimohamed782/knowledge-graph-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: RELAXAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: relaxai-secret
              key: api-key
        - name: RELAXAI_API_URL
          value: "https://api.relax.ai/v1/chat/completions"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
