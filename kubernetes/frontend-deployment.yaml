apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-frontend
  template:
    metadata:
      labels:
        app: knowledge-frontend
    spec:
      containers:
      - name: frontend
        image: alimohamed782/knowledge-graph-frontend:latest
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "20m"
            memory: "64Mi"
          requests:
            cpu: "20m"
            memory: "32Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          periodSeconds: 20
        securityContext:
          allowPrivilegeEscalation: false
          fsGroup: 101
